name: "smartcity"
services:
  mqtt:
    image: eclipse-mosquitto
    container_name: mqtt
    volumes:
      - ./mosquitto:/mosquitto
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - 1883:1883
      - 9001:9001
    networks:
      mqtt_network:

  postgres_db:
    image: postgres:latest
    container_name: postgres_db
    restart: always
    env_file:
      - path: ../default.env
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./db/structure.sql:/docker-entrypoint-initdb.d/structure.sql
    ports:
      - "5432:5432"
    networks:
      db_network:

  pgadmin:
    container_name: pgadmin4
    image: dpage/pgadmin4
    restart: always
    env_file:
      - path: ../default.env
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      db_network:

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      hub_redis:

  store:
    container_name: store
    build: ../store
    depends_on:
      - postgres_db
    restart: always
    env_file:
      - path: ../default.env
    ports:
      - "8000:8000"
    networks:
      hub_store:
      db_network:
      hub:

  edge:
    container_name: edge
    build: ../edge
    depends_on:
      - mqtt
      - hub
    env_file:
      - path: ../default.env
    networks:
      mqtt_network:
      edge_hub:

  hub:
    container_name: hub
    build: ../hub
    depends_on:
      - mqtt
      - redis
      - store
    env_file:
      - path: ../default.env
    ports:
      - "9000:8000"
    networks:
      mqtt_network:
      hub_store:
      hub_redis:

  fake_agent:
    container_name: agent
    build: ../agent
    depends_on:
      - mqtt
    env_file:
      - path: ../default.env
    networks:
      mqtt_network:

networks:
  mqtt_network:
  db_network:
  edge_hub:
  hub:
  hub_store:
  hub_redis:

volumes:
  postgres_data:
  pgadmin-data:
